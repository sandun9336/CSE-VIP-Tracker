name: CSE Live VIP Bot

on:
  schedule:
    # ලංකාවේ වෙලාවෙන් උදේ 10:00 (UTC 04:30)
    - cron: '30 4 * * 1-5'
    # ලංකාවේ වෙලාවෙන් උදේ 11:00 (UTC 05:30)
    - cron: '30 5 * * 1-5'
    # ලංකාවේ වෙලාවෙන් දවල් 12:00 (UTC 06:30)
    - cron: '30 6 * * 1-5'
    # ලංකාවේ වෙලාවෙන් දවල් 1:15 (UTC 07:45 - මාකට් එක වැහුණට පසු)
    - cron: '45 7 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run CSE Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
